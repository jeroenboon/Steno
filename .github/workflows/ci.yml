name: CI

# Mirrors the Definition of Done gate (CLAUDE.md): build, lint, format:check,
# Vitest, and the native ABI smoke test — on every PR to master and every push
# to master.
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# A newer push to the same PR/branch cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Read-only: this workflow only verifies; it never writes to the repo.
permissions:
  contents: read

jobs:
  verify:
    name: DoD gate (build · lint · format · test · native)
    # Windows because the app ships on Windows and the native dual-ABI trap
    # (better-sqlite3 / sherpa-onnx under Node vs Electron) is what test:native
    # exists to catch — running it on the target OS is the point.
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      # Pin the exact npm that generated package-lock.json. The optional
      # @emnapi wasm-fallback deps (via the ESLint resolver) resolve differently
      # across npm patch versions, so an npm mismatch makes `npm ci` reject the
      # lockfile as out of sync. Keep this in lockstep with the dev toolchain.
      # (The package.json `overrides` block pins the three @emnapi versions for
      # the same reason. Re-verified 2026-07-06 (npm 11.6.2) as still
      # deduplicating the lockfile: dropping them regresses it with nested
      # duplicate @emnapi copies, so they stay. Revisit at the next major
      # toolchain bump. Audit T8.)
      - name: Pin npm to the lockfile's version
        run: npm install --global npm@11.6.2

      # The Electron binary is a large download; cache it across runs so only
      # the first run (or a lockfile change) pays for it. Cache misses are
      # non-fatal.
      - name: Cache Electron binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      # Reproducible install from the committed lockfile. postinstall swaps the
      # native modules to the Electron ABI (scripts/rebuild-native.mjs).
      - name: Install dependencies
        run: npm ci

      # Cheap, fast checks first so failures surface quickly.
      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      # pretest swaps the native ABI to Node so Vitest can open better-sqlite3.
      - name: Unit tests (Vitest)
        run: npm test

      # pretest:native swaps back to the Electron ABI, then loads the native
      # modules under Electron's real runtime (ELECTRON_RUN_AS_NODE — no display
      # needed). This is the gate the Node-side suite structurally cannot catch.
      - name: Native ABI smoke test
        run: npm run test:native

      # Coverage is measured for VISIBILITY ONLY (audit Q1): NO threshold gate —
      # thresholds invite gaming. continue-on-error keeps it strictly additive so
      # a coverage tooling hiccup never wedges a merge. pretest:coverage swaps the
      # native ABI back to Node (like pretest) so Vitest can open better-sqlite3.
      - name: Coverage (v8, non-gating)
        continue-on-error: true
        shell: pwsh
        env:
          NO_COLOR: '1'
          FORCE_COLOR: '0'
        run: |
          npm run test:coverage 2>&1 | Tee-Object -FilePath coverage-output.txt
          "## Test coverage (v8, non-gating — visibility only, no threshold)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          '```' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          Select-String -Path coverage-output.txt -Pattern '^(Statements|Branches|Functions|Lines)\s+:' |
            ForEach-Object { $_.Line } |
            Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          '```' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

  # Supply-chain + secret hygiene. Split off the DoD gate so it runs in parallel
  # on cheap Linux (no native rebuild, no Electron download) and its findings
  # read separately from "does it build/pass". Advisory for now — promote to a
  # required check (branch protection) once the check name has run once.
  security:
    name: Security (audit · secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so gitleaks can scan every commit on a PR, not just the tip.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      # Reads package-lock.json against the advisory DB — no install, no native
      # rebuild. Fails only on high/critical so a low-severity transitive advisory
      # doesn't wedge every merge.
      - name: npm audit (high+)
        run: npm audit --audit-level=high

      # Belt-and-suspenders over GitHub's native secret scanning + push
      # protection: scans the PR's own commits so a leaked key is caught in CI too.
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
