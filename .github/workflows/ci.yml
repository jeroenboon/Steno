name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  ci:
    name: Typecheck, lint, format, test, build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      # Vitest runs under system Node and cannot detect a native module built
      # for the wrong ABI. This loads better-sqlite3 under Electron's runtime so
      # an ABI mismatch fails CI instead of crashing the app at startup.
      - name: Native module smoke test (Electron runtime)
        run: npm run test:native

      - name: Build
        run: npm run build
        env:
          # electron-builder needs this to skip native module rebuilds in CI
          ELECTRON_BUILDER_SKIP_REBUILD: '1'
